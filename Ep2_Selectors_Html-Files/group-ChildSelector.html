<!DOCTYPE html>
<html>

<head>
    <title> Child Selector </title>
    <link rel="stylesheet" href="./CSS/Group-ChildSelector.css">
</head>

<body>

    <div class="first-parent">
        <p> First Parent Paragraph </p>
        <h3> First Parent Heading </h3>


        <div class="first-child">
            <p> First Child Paragraph </p>
            <h1> First Child Heading </h1>
        </div>
    </div>

    <div class="second-parent">
        <p> Second parent Paragraph </p>
        <h3> Second Parent Heading </h3>


        <div class="second-child">
            <p> Am a child of parent 2 </p>
            <h3> Am a child of parent 2 </h3>
        </div>
    </div>


</body>

</html>
