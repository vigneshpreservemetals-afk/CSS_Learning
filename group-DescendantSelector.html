<head>
    <title> Descendant/ Group Selector </title>
    <link rel="stylesheet" href="./CSS/DeescendantSelector.css">
</head>

<body>

    <div class="first-parent">
        <p> Am parent1 </p>
        <h3> Am parent 1</h3>


        <div class="first-child">
            <p> Am a child of parent 1 </p>

    <div class="second-parent">
        <p> Am parent 2 </p>
        <h3> Am parent 2 </h3>


        <div class="second-child">
            <p> Am a child of parent 2 </p>
            <h3> Am a child of parent 2 </h3>
        </div>
    </div>


</body>

</html>
